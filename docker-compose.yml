services:
  app:
    build: .
    container_name: churn_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:jee4472@db:5432/churn_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: churn_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jee4472
      POSTGRES_DB: churn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d churn_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: